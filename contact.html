<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>צרו קשר | התבייתות</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/book.css">
    <link rel="stylesheet" href="css/contact.css">
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Heebo:wght@300;400;600&display=swap" rel="stylesheet">
    </head>

<body class="chapter-page">

<!-- NAVBAR -->
<script src="js/header.js"></script>

<!-- BOOK SCENE -->
<div class="book-outer">

    <div class="book-top-band"></div>

    <div class="book-spread">

        <div class="book-page-left">
            <div class="left-page-content">
                
            </div>
        </div>

        <div class="book-spine"></div>

        <div class="book-page-right">
            <div class="page-content">

                <h1 class="chapter-title">צרו קשר</h1>
                <div class="chapter-subtitle">נשמח לשמוע מכם</div>
                <div class="page-divider"></div>

                <form class="contact-form" onsubmit="handleContactSubmit(event)" novalidate>
                    <div class="form-group">
                        <label for="name">שם מלא</label>
                        <input type="text" id="name" name="name" placeholder="הזינו את שמכם" required>
                    </div>
                    <div class="form-group">
                        <label for="email">דואר אלקטרוני</label>
                        <input type="email" id="email" name="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="subject">נושא</label>
                        <input type="text" id="subject" name="subject" placeholder="נושא הפנייה" required dir="rtl">
                    </div>
                    <div class="form-group">
                        <label for="message">הודעה</label>
                        <textarea id="message" name="message" placeholder="כתבו לנו את הודעתכם..." required></textarea>
                    </div>
                    <button type="submit" class="form-submit-btn">שלח הודעה</button>
                    <p class="contact-note">נציגנו יחזרו אליכם תוך 1–3 ימי עסקים</p>
                </form>

            </div>
        </div>

    </div>

    <div class="book-bottom-band"></div>
    <div class="book-shadow"></div>

    <!-- CHECKOUT POPUP -->
    <div id="checkout-popup" class="checkout-popup">
        <div class="checkout-popup-inner">
            <button class="close-popup-btn" onclick="hideCheckoutPopup()">×</button>
            <div class="checkout-popup-icon">📬</div>
            <h2>הודעתך נשלחה!</h2>
            <p>תודה שפניתם אלינו.<br>נחזור אליכם בהקדם האפשרי.</p>
            <div class="checkout-popup-btns">
                <button class="continue-btn" onclick="hideCheckoutPopup()">סגור</button>
            </div>
        </div>
    </div>

    <!-- CART DRAWER -->
    <div id="cart-drawer" class="cart-drawer">
        <div class="cart-header">
            <h3>סל הקניות שלי</h3>
            <button onclick="toggleCart()" class="close-btn">×</button>
        </div>
        <div id="cart-items" class="cart-items-list"></div>
        <div class="cart-footer">
            <div class="cart-subtotal-row">ספרים: <span id="cart-total">₪0</span></div>
            <div id="cart-delivery" class="cart-delivery-row"></div>
            <div id="cart-grand-total" class="total-row" style="display:none;"></div>
            <button id="checkout-btn" class="checkout-btn" disabled>לתשלום מאובטח</button>
        </div>
    </div>
    <div id="overlay" onclick="toggleCart()"></div>

</div>

<script src="js/cart_script.js"></script>
<script>
function handleContactSubmit(e) {
    e.preventDefault();
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const subject = document.getElementById('subject').value;
    const message = document.getElementById('message').value;
    const body = `שם: ${name}%0D%0Aאימייל: ${email}%0D%0Aנושא: ${subject}%0D%0A%0D%0A${message}`;
    window.location.href = `mailto:info@sifrutzola.co.il?subject=${encodeURIComponent(subject)}&body=${body}`;
}

// Replace browser "Please fill out this field" with Hebrew message
document.querySelectorAll('.contact-form [required]').forEach(function(field) {
    field.addEventListener('invalid', function(e) {
        e.target.setCustomValidity('חשוב למלא שדה זה');
    });
    field.addEventListener('input', function(e) {
        e.target.setCustomValidity('');
    });
});
</script>
<!-- FOOTER -->
<script src="js/footer.js"></script>

</body>

</html>
