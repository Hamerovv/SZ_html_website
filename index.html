<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ספרות זולה</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

.section {
    display: flex;
    min-height: 500px;
}

.image {
    flex: 1;
    background: url('your-image.jpg') center/cover no-repeat;
}

.content {
    flex: 1;
    padding: 60px;
    background: #f4f4f4;
}

h1 {
    font-size: 48px;
    margin-bottom: 20px;
}

.gold-section {
    background: #b8942c;
    color: white;
    text-align: center;
    padding: 80px 20px;
    font-size: 60px;
}
</style>
</head>
<body>

<div class="section">
    <div class="image"></div>
    <div class="content">
        <h1>אודות המחבר</h1>
        <p>כאן יבוא טקסט אודות המחבר...</p>
    </div>
</div>

<div class="gold-section">
    ביקורת
</div>

</body>
</html>
