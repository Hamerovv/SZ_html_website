<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ספרות זולה</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="floating-words"></div>

<nav class="navbar">
    <div class="logo"><img src="images/logo.png" alt="ספרות זולה"></div>

    <div class="nav-center">
        <a href="index.html">דף הבית</a>
        <a href="about.html">אודות</a>
        <a href="perek.html">פרק לקריאה</a>
        <a href="news.html">חדשות</a>
        <a href="contact.html">צור קשר</a>
    </div>

    <div class="nav-left">
        <span style="color:white; font-size:14px;">🔒 Visa • Mastercard</span>
    </div>
</nav>

<section class="hero">
    <div class="hero-content">
        <h1>רוצה לצלול לעולם אחר מרתק?</h1>
        <button class="cta-btn">לקריאת הפרק</button>
    </div>
</section>

<script>
    (function() {
        var words = ["הפתעות","מרגלים","דרמה","צה״ל","מתח","פטריוטים","מבצעים","פוליטיקה","שחיתות","מוסד","אהבה","הרפתקאה","שב״כ","תחכום","תחבולה","עניין","ריגוש","שמחה","פיתויים","סודות","מודיעין","חשאי","גיבורים"];
        var container = document.getElementById('floating-words');

        function spawn() {
            var el = document.createElement('div');
            el.className = "fw-word";
            el.textContent = words[Math.floor(Math.random() * words.length)];

            el.style.left = (10 + Math.random() * 75) + 'vw';
            el.style.top = (10 + Math.random() * 70) + 'vh';

            var dirX = (Math.random() - 0.5) * 200;
            var dirY = (Math.random() > 0.5 ? -1 : 1);
            var rotDir = Math.random() > 0.5 ? 1 : -1;

            el.style.setProperty('--dirX', dirX + 'px');
            el.style.setProperty('--dirY', dirY);
            el.style.setProperty('--rotDir', rotDir);

            var duration = 10 + Math.random() * 5;
            el.style.animation = 'floatDrift ' + duration + 's linear infinite';

            container.appendChild(el);

            setTimeout(function() {
                el.remove();
            }, duration * 1000);
        }

        for (var i = 0; i < 10; i++) {
            setTimeout(spawn, i * 1500);
        }

        setInterval(spawn, 2000);
    })();
</script>

</body>
</html>
